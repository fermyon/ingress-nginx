name: Build ingress-nginx from source

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "The ingress-nginx release tag to build (e.g. controller-v1.12.1)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  SOURCE_REPO: https://github.com/chainguard-forks/ingress-nginx

jobs:
  docker-images:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Clone ingress-nginx at tag ${{ inputs.release_tag }}
        run: |
          git clone --depth 1 --branch "${{ inputs.release_tag }}" \
            "${{ env.SOURCE_REPO }}" ingress-nginx
        
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ inputs.release_tag }}

      - name: Build ingress controller, debug tool and pre-stop hook (amd64)
        working-directory: ingress-nginx
        run: make build ARCH=amd64

      - name: Build ingress controller, debug tool and pre-stop hook (arm64)
        working-directory: ingress-nginx
        run: make build ARCH=arm64

      - name: Read NGINX_BASE
        working-directory: ingress-nginx
        run: echo "NGINX_BASE=$(cat NGINX_BASE)" >> $GITHUB_ENV

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ingress-nginx/rootfs
          push: true
          sbom: true
          provenance: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BASE_IMAGE=${{ env.NGINX_BASE }}
            BUILD_ID=UNSET